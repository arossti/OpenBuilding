<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEAM — Embodied Carbon Calculator (BfCA)</title>
    <meta name="description" content="Browser port of the BEAM / MCE² embodied carbon calculator. Calculates material emissions for Canadian construction projects using the BfCA JSON material database." />

    <!-- CSS: BfCA tokens + PDF-Parser dark theme + Bootstrap for modals/dropdowns + BEAMweb layout -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="bfcastyles.css" />
    <link rel="stylesheet" href="pdfparser.css" />
    <link rel="stylesheet" href="beamweb.css" />

    <!-- Vendor JS — classic script tags. BEAMweb's own code is ES modules. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
  </head>
  <body>
    <div id="beam-app">
      <!-- ── Header ───────────────────────────────────────── -->
      <header class="site-header beam-header">
        <img src="graphics/BFCA-LOGO-sm.png" alt="BfCA" class="header-logo" />
        <div class="beam-title-block">
          <h1 class="beam-title">BEAM <span style="font-size:12px;font-weight:normal;color:var(--text-dim)">· BfCA Embodied Carbon Calculator</span></h1>
          <span class="beam-subtitle">JS port of BEAM / MCE² · Phase 0 shell · consumes the <span id="beam-material-count">BfCA</span> material database</span>
        </div>
        <div class="beam-spacer"></div>
        <nav class="beam-nav">
          <a href="index.html" class="nav-btn" title="PDF takeoff + area extraction">PDF-Parser</a>
          <a href="matrix.html" class="nav-btn" title="EC compliance matrix">Matrix</a>
          <a href="database.html" class="nav-btn" title="BfCA material catalogue">Database</a>
          <a href="beamweb.html" class="nav-btn active" aria-current="page" title="Current app">BEAM</a>
        </nav>
      </header>

      <!-- ── Action bar ──────────────────────────────────── -->
      <div id="beam-action-bar">
        <!-- Import / Export dropdown (Bootstrap-powered) -->
        <div class="btn-group" role="group">
          <button class="beam-action-btn primary" id="beam-new-project" title="Start a fresh project (clears current state)">
            <i class="bi bi-file-earmark-plus"></i> New
          </button>
        </div>

        <div class="btn-group" role="group">
          <button class="beam-action-btn" id="beam-open-project" title="Open a BEAMweb project JSON">
            <i class="bi bi-folder2-open"></i> Open
          </button>
          <button class="beam-action-btn" id="beam-save-project" title="Download current project as JSON">
            <i class="bi bi-download"></i> Save
          </button>
        </div>

        <div class="beam-action-sep"></div>

        <div class="btn-group" role="group">
          <button class="beam-action-btn" id="beam-import-xlsx" title="Import an MCE² or BEAM workbook (.xlsx) into this project">
            <i class="bi bi-file-earmark-spreadsheet"></i> Import xlsx
          </button>
          <button class="beam-action-btn" id="beam-import-pdf-parser" title="Pull areas from a saved PDF-Parser project JSON">
            <i class="bi bi-file-earmark-ruled"></i> Import PDF-Parser
          </button>
        </div>

        <div class="beam-action-sep"></div>

        <button class="beam-action-btn disabled" id="beam-tilt" title="Force recalculation (useful when totals look stale) — available once calc engine lands in Phase 3">
          <i class="bi bi-arrow-repeat"></i> Tilt
        </button>
        <button class="beam-action-btn disabled" id="beam-reset" title="3-tier reset: undo changes / clear imports / factory reset — available once state manager lands in Phase 1">
          <i class="bi bi-arrow-counterclockwise"></i> Reset
        </button>

        <span class="beam-project-name" id="beam-project-name">(untitled project)</span>

        <!-- Hidden file inputs -->
        <input type="file" id="beam-file-open" accept=".json" hidden />
        <input type="file" id="beam-file-xlsx" accept=".xlsx,.xls" hidden />
        <input type="file" id="beam-file-pdfparser" accept=".json" hidden />
      </div>

      <!-- ── Main: tabs sidebar + content panel ──────────── -->
      <div id="beam-main">
        <nav id="beam-sidebar">
          <!-- Populated by beamweb.mjs from the BEAM_TABS constant -->
        </nav>

        <section id="beam-content">
          <!-- Tab panels rendered by beamweb.mjs. One active at a time. -->
        </section>
      </div>

      <!-- Sidebar results footer — floats above tabs on large screens; for now kept as a simple status row in the status bar -->

      <!-- ── Status bar ──────────────────────────────────── -->
      <div id="beam-status-bar">
        <span id="beam-status-msg" class="status-ready">Shell ready · no calc engine yet · phase 0</span>
        <span class="beam-spacer"></span>
        <span id="beam-material-source" class="beam-build-tag">materials: data/schema/materials/index.json</span>
        <span class="beam-build-tag">build: BEAMweb alpha · <a href="dependencies.html" style="color: var(--text-dim); text-decoration: none;" title="Dependency manifest">deps</a></span>
      </div>
    </div>

    <script type="module" src="js/beamweb.mjs"></script>
  </body>
</html>
