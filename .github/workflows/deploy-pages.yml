name: Deploy PDF-Parser to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # Skip on bfca-labs/at (private mirror with no Pages site). Runs only on
    # the public repo where Pages is configured.
    if: github.repository == 'arossti/OpenBuilding'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage schema data into PDF-Parser/data/schema
        # database.html reads the committed BEAM material catalogue from
        # schema/materials/ and friends. Local dev runs `npm run stage:data`
        # (see PDF-Parser/package.json) to produce the same layout.
        run: |
          mkdir -p PDF-Parser/data/schema
          cp -r schema/materials PDF-Parser/data/schema/
          cp schema/material.schema.json PDF-Parser/data/schema/
          cp schema/sample.json PDF-Parser/data/schema/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: PDF-Parser/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
