name: Deploy PDF-Parser to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # Skip on bfca-labs/at (private mirror with no Pages site). Runs only on
    # the public repo where Pages is configured.
    if: github.repository == 'arossti/OpenBuilding'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: PDF-Parser/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
