name: Deploy BfCA OpenBuilding to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # Skip on bfca-labs/at (private mirror with no Pages site). Runs only on
    # the public repo where Pages is configured.
    if: github.repository == 'arossti/OpenBuilding'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage deployable site into _site/
        # Repo is flat post-cleanup (session 2026-04-20): HTML + CSS + js/
        # live at root, so we compose a clean Pages artifact here rather
        # than upload the whole repo (which would otherwise include schema/
        # as source, docs/, the .md workplans, dev configs, etc.).
        #
        # database.html reads the BfCA material catalogue from data/schema/
        # at runtime; BEAMweb assembly tabs fetch picker CSVs from
        # data/beam/. Local dev runs `npm run stage:data` to produce the
        # same data/ layout.
        run: |
          mkdir -p _site/data/schema _site/data/schema/lookups _site/data/beam _site/data/beam/samples

          # Deployable app surface
          cp index.html pdfparser.html matrix.html database.html beamweb.html epdparser.html dependencies.html _site/
          cp bfcastyles.css _site/
          cp -r js graphics lib _site/

          # Runtime data (staged from authoritative sources)
          cp -r schema/materials _site/data/schema/
          cp -r schema/lookups/. _site/data/schema/lookups/
          cp schema/material.schema.json _site/data/schema/
          cp schema/sample.json _site/data/schema/
          cp "docs/csv files from BEAM/Footings & Slabs.csv" _site/data/beam/footings-slabs.csv
          cp docs/beam-samples/*.json _site/data/beam/samples/
          cp docs/sample.pdf _site/data/sample.pdf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
